<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Krea AI Inpainting</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1e1e1e;
        color: #e0e0e0;
        font-size: 13px;
        height: 100vh;
        overflow-y: auto;
      }

      .header {
        background: #2a2a2a;
        padding: 10px 12px;
        border-bottom: 1px solid #3a3a3a;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header-logo {
        width: 22px;
        height: 22px;
        background: linear-gradient(135deg, #7c3aed, #ec4899);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        color: white;
        flex-shrink: 0;
      }

      .header h1 {
        font-size: 13px;
        font-weight: 600;
        color: #fff;
      }

      .lang-switcher {
        margin-left: auto;
        display: flex;
        gap: 3px;
        flex-shrink: 0;
      }

      .lang-btn {
        background: none;
        border: 1px solid #3a3a3a;
        border-radius: 3px;
        color: #888;
        font-size: 10px;
        padding: 2px 5px;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }

      .lang-btn:hover {
        color: #eee;
        border-color: #555;
      }

      .lang-btn.active {
        color: #a78bfa;
        border-color: #7c3aed;
        background: #7c3aed22;
      }

      .content {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      label {
        display: block;
        font-size: 11px;
        color: #888;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input[type="text"],
      input[type="password"],
      textarea,
      select {
        width: 100%;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 5px;
        color: #e0e0e0;
        padding: 7px 10px;
        font-size: 12px;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus,
      input[type="password"]:focus,
      textarea:focus,
      select:focus {
        border-color: #7c3aed;
      }

      textarea {
        resize: vertical;
        min-height: 70px;
        font-family: inherit;
        line-height: 1.5;
      }

      .api-row {
        display: flex;
        gap: 6px;
        align-items: flex-end;
      }

      .api-row input {
        flex: 1;
      }

      .btn {
        background: #7c3aed;
        color: white;
        border: none;
        border-radius: 5px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }

      .btn:hover {
        background: #6d28d9;
      }
      .btn:active {
        background: #5b21b6;
      }
      .btn:disabled {
        background: #444;
        color: #666;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        color: #aaa;
      }
      .btn-secondary:hover {
        background: #333;
        color: #eee;
        border-color: #555;
      }

      .btn-full {
        width: 100%;
      }

      .model-select {
        width: 100%;
      }

      .status-box {
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 5px;
        padding: 8px 10px;
        font-size: 11px;
        color: #888;
        min-height: 36px;
        line-height: 1.5;
        display: none;
      }

      .status-box.visible {
        display: block;
      }
      .status-box.loading {
        color: #a78bfa;
        border-color: #7c3aed44;
      }
      .status-box.success {
        color: #4ade80;
        border-color: #22c55e44;
      }
      .status-box.error {
        color: #f87171;
        border-color: #ef444444;
      }

      .preview-box {
        display: none;
        border-radius: 5px;
        overflow: hidden;
        border: 1px solid #3a3a3a;
      }

      .preview-box.visible {
        display: block;
      }

      .preview-box img {
        width: 100%;
        display: block;
      }

      .preview-actions {
        display: flex;
        gap: 6px;
        padding: 6px;
        background: #2a2a2a;
      }

      .preview-actions .btn {
        flex: 1;
        font-size: 11px;
        padding: 6px;
      }

      .divider {
        border: none;
        border-top: 1px solid #333;
      }

      .tip {
        font-size: 10px;
        color: #555;
        line-height: 1.5;
      }

      .tip a {
        color: #7c3aed;
        text-decoration: none;
      }

      .strength-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .strength-row input[type="range"] {
        flex: 1;
        accent-color: #7c3aed;
        background: transparent;
        border: none;
        padding: 0;
      }

      .strength-val {
        font-size: 12px;
        color: #aaa;
        min-width: 28px;
        text-align: right;
      }

      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid #7c3aed44;
        border-top-color: #7c3aed;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .badge {
        display: inline-block;
        font-size: 9px;
        padding: 1px 5px;
        border-radius: 3px;
        background: #7c3aed33;
        color: #a78bfa;
        margin-left: 4px;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-logo">K</div>
      <h1>Krea AI <span class="badge" id="badgeText"></span></h1>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="zh">中</button>
      </div>
    </div>

    <div class="content">
      <!-- API Key -->
      <div>
        <label id="apiKeyLabel"></label>
        <div class="api-row">
          <input type="password" id="apiKey" />
          <button class="btn btn-secondary" id="saveKey"></button>
        </div>
      </div>

      <!-- Proxy URL -->
      <div>
        <label id="workerLabel"></label>
        <div class="api-row">
          <input type="text" id="proxyUrl" />
          <button class="btn btn-secondary" id="saveProxy"></button>
        </div>
        <p class="tip" id="corsTip" style="margin-top: 4px"></p>
      </div>

      <hr class="divider" />

      <!-- Model -->
      <div>
        <label id="modelLabel"></label>
        <select class="model-select" id="model">
          <option value="nano-banana" id="opt-nano-banana"></option>
          <option value="nano-banana-pro" id="opt-nano-banana-pro"></option>
          <option value="flux-kontext" id="opt-flux-kontext"></option>
          <option value="chatgpt-2" id="opt-chatgpt-2"></option>
          <option value="seededit" id="opt-seededit"></option>
          <option value="imagen-4" id="opt-imagen-4"></option>
        </select>
      </div>

      <!-- Prompt -->
      <div>
        <label id="promptLabel"></label>
        <textarea id="prompt"></textarea>
      </div>

      <!-- Strength -->
      <div>
        <label id="strengthLabel"></label>
        <div class="strength-row">
          <input
            type="range"
            id="strength"
            min="0.1"
            max="1"
            step="0.05"
            value="0.85"
          />
          <span class="strength-val" id="strengthVal">0.85</span>
        </div>
        <p class="tip" id="strengthTip"></p>
      </div>

      <!-- Mode -->
      <div>
        <label id="modeLabel"></label>
        <select id="mode">
          <option value="selection" id="opt-selection"></option>
          <option value="full" id="opt-full"></option>
        </select>
      </div>

      <hr class="divider" />

      <!-- Generate -->
      <button class="btn btn-full" id="generateBtn"></button>

      <div class="status-box" id="status"></div>

      <!-- Preview -->
      <div class="preview-box" id="previewBox">
        <img id="previewImg" src="" alt="" />
        <div class="preview-actions">
          <button class="btn" id="applyBtn"></button>
          <button class="btn btn-secondary" id="discardBtn"></button>
        </div>
      </div>

      <p class="tip" id="bottomTip"></p>
    </div>
    <div style="position:fixed;bottom:6px;right:8px;font-size:10px;color:#444;pointer-events:none;">v1.8</div>

    <script>

          optChatgpt2: "ChatGPT Image 2 — настоящий inpainting",
          optSeededit: "SeedEdit — frontier editing",
          optImagen4: "Imagen 4 — Google, высокое качество",
          promptLabel: "Промпт (что нарисовать)",
          promptPlaceholder: "Например: a glowing magic crystal ball on a wooden table, fantasy style",
          strengthLabel: "Сила редактирования",
          strengthTip: "0.1 = почти без изменений · 1.0 = полная генерация",
          modeLabel: "Режим",
          modeSelection: "Только выделенная область",
          modeFull: "Весь холст",

          discardBtn: "✕ Отмена",
          bottomTip: "Совет: сделай выделение (Ctrl+A для всего, или Rectangular Marquee Tool) → введи промпт → нажми Генерировать.<br/><br/>Krea API: async job polling · модель <b>Flux Kontext</b> лучше всего для редактирования существующих изображений.",
          keySaved: "API key сохранён",
          proxySaved: "Proxy URL сохранён",
          errApiKey: "❌ Введите API Key",
          errProxy: "❌ Введите URL Cloudflare Worker (прокси)",
          errPrompt: "❌ Введите промпт",

          errNoSelection: "❌ Нет активного выделения. Сделайте выделение лассо или прямоугольником и попробуйте снова.",
          createMask: "🎭 Создаю маску для inpainting...",
          cropSelection: "✂️ Вырезаю выделенную область...",
          uploading: "⬆️ Загружаю в Krea...",

          apiKeyPlaceholder: "来自 krea.ai/settings/api-tokens 的 Bearer token",
          saveKeyBtn: "保存",
          workerLabel: 'Cloudflare Worker URL <a href="https://workers.cloudflare.com" target="_blank" style="text-transform:none;color:#7c3aed">→ 免费创建</a>',
          workerPlaceholder: "https://krea-proxy.名称.workers.dev",
          saveProxyBtn: "保存",
          corsTip: "需要绕过 CORS 限制。部署仅需 2 分钟。",

          optNanoBanana: "Nano Banana — 快速且便宜 ($0.04)",
          optNanaBananaPro: "Nano Banana Pro — 通用型",

          promptPlaceholder: "例如：a glowing magic crystal ball on a wooden table, fantasy style",
          strengthLabel: "编辑强度",
          strengthTip: "0.1 = 几乎无变化 · 1.0 = 完全生成",
          modeLabel: "模式",
          modeSelection: "仅选中区域",
          modeFull: "整个画布",
          generateBtn: "✦ 生成",
          previewAlt: "结果",
          applyBtn: "✓ 应用到图层",
          discardBtn: "✕ 取消",
          bottomTip: "提示：先创建选区（Ctrl+A 全选，或使用矩形选框工具）→ 输入提示词 → 点击生成。<br/><br/>Krea API：异步任务轮询 · <b>Flux Kontext</b> 模型最适合编辑现有图像。",
          keySaved: "API key 已保存",
          proxySaved: "Proxy URL 已保存",
          errApiKey: "❌ 请输入 API Key",
          errProxy: "❌ 请输入 Cloudflare Worker URL（代理）",
          errPrompt: "❌ 请输入提示词",
          exportCanvas: "📷 正在导出画布...",
          readSelection: "🔍 正在读取选区...",
          errNoSelection: "❌ 无活动选区。请先创建套索或矩形选区，然后重试。",
          createMask: "🎭 正在创建局部重绘蒙版...",
          cropSelection: "✂️ 正在裁剪选中区域...",
          uploading: "⬆️ 正在上传到 Krea...",
          submitting: "🚀 正在向 Krea 提交任务...",
          jobStarted: (id) => `⏳ 任务已提交 (${id}...)。等待结果...`,
          polling: (status) => `⏳ 状态：${status}...`,
          downloading: "⬇️ 正在通过代理下载结果...",
          done: "✅ 完成！请选择操作。",
          applying: "📥 正在将结果插入文档...",
          applied: '✅ 图层 "Krea AI Result" 已添加！',
          errDocNoImage: "文档未返回图像",
          errTimeout: (secs) => `生成超时（>${secs} 秒）`,
          errNoUrl: "API 未返回图像 URL",
          errLayerNotAdded: "图层未被添加到 Photopea（超时）",
        },
      };

      let currentLang = localStorage.getItem("krea_lang") || "ru";

      function t(key, ...args) {
        const val = TRANSLATIONS[currentLang]?.[key] ?? TRANSLATIONS.en[key];
        return typeof val === "function" ? val(...args) : (val ?? key);
      }

      function applyLang() {
        document.getElementById("badgeText").textContent = t("badge");
        document.getElementById("apiKeyLabel").innerHTML = t("apiKeyLabel");
        document.getElementById("apiKey").placeholder = t("apiKeyPlaceholder");
        document.getElementById("saveKey").textContent = t("saveKeyBtn");
        document.getElementById("workerLabel").innerHTML = t("workerLabel");
        document.getElementById("proxyUrl").placeholder = t("workerPlaceholder");
        document.getElementById("saveProxy").textContent = t("saveProxyBtn");
        document.getElementById("corsTip").textContent = t("corsTip");
        document.getElementById("modelLabel").textContent = t("modelLabel");
        document.getElementById("opt-nano-banana").textContent = t("optNanoBanana");
        document.getElementById("opt-nano-banana-pro").textContent = t("optNanaBananaPro");
        document.getElementById("opt-flux-kontext").textContent = t("optFluxKontext");
        document.getElementById("opt-chatgpt-2").textContent = t("optChatgpt2");
        document.getElementById("opt-seededit").textContent = t("optSeededit");
        document.getElementById("opt-imagen-4").textContent = t("optImagen4");
        document.getElementById("promptLabel").textContent = t("promptLabel");
        document.getElementById("prompt").placeholder = t("promptPlaceholder");
        document.getElementById("strengthLabel").textContent = t("strengthLabel");
        document.getElementById("strengthTip").textContent = t("strengthTip");
        document.getElementById("modeLabel").textContent = t("modeLabel");
        document.getElementById("opt-selection").textContent = t("modeSelection");
        document.getElementById("opt-full").textContent = t("modeFull");
        document.getElementById("generateBtn").textContent = t("generateBtn");
        document.getElementById("previewImg").alt = t("previewAlt");
        document.getElementById("applyBtn").textContent = t("applyBtn");
        document.getElementById("discardBtn").textContent = t("discardBtn");
        document.getElementById("bottomTip").innerHTML = t("bottomTip");

        document.querySelectorAll(".lang-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.lang === currentLang);
        });
      }

      document.querySelectorAll(".lang-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentLang = btn.dataset.lang;
          localStorage.setItem("krea_lang", currentLang);
          applyLang();
        });
      });

      applyLang();

      // ─── Config ──────────────────────────────────────────────────────────────────
      let API_BASE = localStorage.getItem("krea_proxy") || "";

      // ─── Logger ──────────────────────────────────────────────────────────────────
      const log = (...a) => console.log("[KREA PLUGIN]", ...a);
      log("plugin loaded");

      // ─── State ───────────────────────────────────────────────────────────────────
      let lastResultUrl = null;
      let lastResultBlob = null;
      let lastResultBuffer = null;
      let lastCropBounds = null;
      let lastWasFullCanvas = false;
      let selectionBounds = null;

      // ─── Persist API key ──────────────────────────────────────────────────────────
      const apiKeyInput = document.getElementById("apiKey");
      const savedKey = localStorage.getItem("krea_api_key");
      if (savedKey) apiKeyInput.value = savedKey;

      document.getElementById("saveKey").addEventListener("click", () => {
        localStorage.setItem("krea_api_key", apiKeyInput.value.trim());
        showStatus(t("keySaved"), "success");
      });

      // ─── Proxy URL ────────────────────────────────────────────────────────────────
      const proxyInput = document.getElementById("proxyUrl");
      const savedProxy = localStorage.getItem("krea_proxy");
      if (savedProxy) proxyInput.value = savedProxy;

      document.getElementById("saveProxy").addEventListener("click", () => {
        const val = proxyInput.value.trim().replace(/\/$/, "");
        localStorage.setItem("krea_proxy", val);
        window.API_BASE_RUNTIME = val;
        showStatus(t("proxySaved"), "success");
      });

      // ─── Strength slider ─────────────────────────────────────────────────────────
      const strengthSlider = document.getElementById("strength");
      const strengthVal = document.getElementById("strengthVal");
      strengthSlider.addEventListener("input", () => {
        strengthVal.textContent = parseFloat(strengthSlider.value).toFixed(2);
      });

      // ─── Status helper ───────────────────────────────────────────────────────────
      function showStatus(msg, type = "loading", spinner = false) {
        const el = document.getElementById("status");
        el.className = `status-box visible ${type}`;
        el.innerHTML = spinner ? `<span class="spinner"></span>${msg}` : msg;
      }

      function hideStatus() {
        document.getElementById("status").className = "status-box";
      }

      // ─── postMessage to Photopea ─────────────────────────────────────────────────
      function ppRun(script) {
        return new Promise((resolve) => {
          const results = [];
          const handler = (e) => {
            if (e.source !== window.parent) return;
            if (e.data === "done") {
              window.removeEventListener("message", handler);
              resolve(results);
            } else {
              results.push(e.data);
            }
          };
          window.addEventListener("message", handler);
          window.parent.postMessage(script, "*");
        });
      }

      // ─── Encode ArrayBuffer → base64 ─────────────────────────────────────────────
      function arrayBufferToBase64(buffer) {
        let binary = "";
        const bytes = new Uint8Array(buffer);
        for (let i = 0; i < bytes.byteLength; i++)
          binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
      }

      function base64ToArrayBuffer(b64) {
        const binary = atob(b64);
        const buf = new ArrayBuffer(binary.length);
        const view = new Uint8Array(buf);
        for (let i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
        return buf;
      }

      // ─── Get canvas export from Photopea ─────────────────────────────────────────
      async function getCanvasImage() {
        return new Promise((resolve, reject) => {
          let buffer = null;
          const handler = (e) => {
            if (e.source !== window.parent) return;
            if (e.data instanceof ArrayBuffer) {
              buffer = e.data;
              log(`canvas exported: ${e.data.byteLength} bytes`);
            } else if (e.data === "done") {
              window.removeEventListener("message", handler);
              if (buffer) resolve(buffer);
              else reject(new Error(t("errDocNoImage")));
            }
          };
          window.addEventListener("message", handler);
          window.parent.postMessage(`app.activeDocument.saveToOE("png")`, "*");
        });
      }

      // ─── Get selection bounds ─────────────────────────────────────────────────────
      async function getSelectionBounds() {
        const res = await ppRun(`
  try {
    var doc = app.activeDocument;
    var sel = doc.selection;
    var b = sel.bounds;
    app.echoToOE(JSON.stringify({
      left: Math.round(b[0].value),
      top: Math.round(b[1].value),
      right: Math.round(b[2].value),
      bottom: Math.round(b[3].value),
      docW: Math.round(doc.width.value),
      docH: Math.round(doc.height.value)
    }));
  } catch(e) {
    app.echoToOE("NO_SELECTION:" + e);
  }
  `);
        log("getSelectionBounds res array:", res);
        const str = res.find((x) => typeof x === "string" && x !== "done");
        log("getSelectionBounds raw:", str);
        if (!str || str.startsWith("NO_SELECTION")) return null;
        try {
          const bounds = JSON.parse(str);
          log("getSelectionBounds parsed:", bounds);
          return bounds;
        } catch {
          return null;
        }
      }

      // ─── Create mask PNG (white = edit zone, black = keep) ───────────────────────
      async function createMaskDataUrl(bounds, docW, docH) {
        const canvas = document.createElement("canvas");
        canvas.width = docW;
        canvas.height = docH;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, docW, docH);
        ctx.fillStyle = "white";
        ctx.fillRect(
          bounds.left,
          bounds.top,
          bounds.right - bounds.left,
          bounds.bottom - bounds.top,
        );
        return canvas.toDataURL("image/png");
      }

      // ─── Convert blob to base64 data URL ─────────────────────────────────────────
      async function blobToDataUrl(blob) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("FileReader failed"));
          reader.readAsDataURL(blob);
        });
      }

      // ─── Upload asset to Krea ─────────────────────────────────────────────────────
      async function uploadAsset(apiKey, blob, filename) {
        const form = new FormData();
        form.append("file", blob, filename);
        const res = await fetch(API_BASE + "/assets", {
          method: "POST",
          headers: { Authorization: `Bearer ${apiKey}` },
          body: form,
        });
        if (!res.ok)
          throw new Error(
            `Asset upload failed: ${res.status} ${await res.text()}`,
          );
        const data = await res.json();
        return data.image_url || data.url || data.id;
      }

      // ─── Poll job until done ──────────────────────────────────────────────────────
      async function pollJob(apiKey, jobId, maxWait = 120000 * 3) {
        const start = Date.now();
        while (Date.now() - start < maxWait) {
          await new Promise((r) => setTimeout(r, 2500));
          const res = await fetch(API_BASE + `/jobs/${jobId}`, {
            headers: { Authorization: `Bearer ${apiKey}` },
          });
          if (!res.ok) throw new Error(`Poll failed: ${res.status}`);
          const data = await res.json();
          log(`poll: status=${data.status}`);
          showStatus(t("polling", data.status), "loading", true);
          if (data.status === "completed") return data.result;
          if (data.status === "failed" || data.status === "cancelled") {
            throw new Error(`Job ${data.status}`);
          }
        }
        throw new Error(t("errTimeout", maxWait / 1000));
      }

      // ─── Model endpoint map ───────────────────────────────────────────────────────
      const MODEL_ENDPOINTS = {
        "flux-kontext": "/generate/image/bfl/flux-1-kontext-dev",
        "chatgpt-2": "/generate/image/openai/gpt-image-2",
        seededit: "/generate/image/bytedance/seededit",
        "nano-banana-pro": "/generate/image/google/nano-banana-pro",
        "imagen-4": "/generate/image/google/imagen-4",
        "nano-banana": "/generate/image/google/nano-banana",
      };

      // ─── Main generate flow ───────────────────────────────────────────────────────
      document
        .getElementById("generateBtn")
        .addEventListener("click", async () => {
          const apiKey = apiKeyInput.value.trim();
          if (!apiKey) {
            showStatus(t("errApiKey"), "error");
            return;
          }

          API_BASE =
            proxyInput.value.trim().replace(/\/$/, "") ||
            localStorage.getItem("krea_proxy") ||
            "";
          if (!API_BASE) {
            showStatus(t("errProxy"), "error");
            return;
          }

          const prompt = document.getElementById("prompt").value.trim();
          if (!prompt) {
            showStatus(t("errPrompt"), "error");
            return;
          }

          const mode = document.getElementById("mode").value;
          const model = document.getElementById("model").value;
          const strength = parseFloat(
            document.getElementById("strength").value,
          );
          log(`generate: mode=${mode} model=${model} strength=${strength} prompt="${prompt}"`);

          document.getElementById("generateBtn").disabled = true;
          document.getElementById("previewBox").className = "preview-box";

          try {
            // 1. Export canvas
            showStatus(t("exportCanvas"), "loading", true);
            const canvasBuffer = await getCanvasImage();

            // 2. Get selection
            let bounds = null;
            if (mode === "selection") {
              showStatus(t("readSelection"), "loading", true);
              bounds = await getSelectionBounds();
              if (!bounds) {
                showStatus(t("errNoSelection"), "error");
                return;
              }
            }

            // 3. Prepare image
            let sendBlob, sendW, sendH, cropBounds;

            const img = await createImageBitmap(
              new Blob([canvasBuffer], { type: "image/png" }),
            );
            const docW = bounds?.docW || img.width;
            const docH = bounds?.docH || img.height;

            log(`image prep: docW=${docW} docH=${docH} bounds=${JSON.stringify(bounds)}`);

            if (mode === "selection" && bounds && model === "chatgpt-2") {
              cropBounds = bounds;
              lastWasFullCanvas = true;
              log("mode: chatgpt-2 inpainting, sending full canvas with transparent hole");
              sendW = docW;
              sendH = docH;
              showStatus(t("createMask"), "loading", true);
              const maskCanvas = document.createElement("canvas");
              maskCanvas.width = docW;
              maskCanvas.height = docH;
              const mctx = maskCanvas.getContext("2d");
              mctx.drawImage(img, 0, 0);
              mctx.clearRect(
                bounds.left,
                bounds.top,
                bounds.right - bounds.left,
                bounds.bottom - bounds.top,
              );
              sendBlob = await new Promise((res) =>
                maskCanvas.toBlob(res, "image/png"),
              );
            } else if (mode === "selection" && bounds) {
              lastWasFullCanvas = false;
              cropBounds = bounds;
              log("mode: selection crop, sending cropped region");
              const sel_w = bounds.right - bounds.left;
              const sel_h = bounds.bottom - bounds.top;
              sendW = sel_w;
              sendH = sel_h;
              showStatus(t("cropSelection"), "loading", true);
              const cropCanvas = document.createElement("canvas");
              cropCanvas.width = sel_w;
              cropCanvas.height = sel_h;
              const cctx = cropCanvas.getContext("2d");
              cctx.fillStyle = "#ffffff";
              cctx.fillRect(0, 0, sel_w, sel_h);
              cctx.drawImage(
                img,
                bounds.left,
                bounds.top,
                sel_w,
                sel_h,
                0,
                0,
                sel_w,
                sel_h,
              );
              sendBlob = await new Promise((res) =>
                cropCanvas.toBlob(res, "image/png"),
              );
            } else {
              lastWasFullCanvas = false;
              cropBounds = null;
              log("mode: full canvas");
              sendW = docW;
              sendH = docH;
              const fullCanvas = document.createElement("canvas");
              fullCanvas.width = docW;
              fullCanvas.height = docH;
              const fctx = fullCanvas.getContext("2d");
              fctx.fillStyle = "#ffffff";
              fctx.fillRect(0, 0, docW, docH);
              fctx.drawImage(img, 0, 0);
              sendBlob = await new Promise((res) =>
                fullCanvas.toBlob(res, "image/png"),
              );
            }

            // flux-kontext requires min 512×512
            if (model === "flux-kontext" && (sendW < 512 || sendH < 512)) {
              const scale = Math.max(512 / sendW, 512 / sendH);
              const scaledW = Math.round(sendW * scale);
              const scaledH = Math.round(sendH * scale);
              log(`flux-kontext: scaling ${sendW}x${sendH} → ${scaledW}x${scaledH}`);
              const scaledImg = await createImageBitmap(sendBlob);
              const sc = document.createElement("canvas");
              sc.width = scaledW;
              sc.height = scaledH;
              sc.getContext("2d").drawImage(scaledImg, 0, 0, scaledW, scaledH);
              sendBlob = await new Promise((res) => sc.toBlob(res, "image/png"));
              sendW = scaledW;
              sendH = scaledH;
            }

            // 4. Upload image
            log(`upload: sendW=${sendW} sendH=${sendH} blobSize=${sendBlob.size}`);
            showStatus(t("uploading"), "loading", true);
            let image_url;
            try {
              image_url = await uploadAsset(apiKey, sendBlob, "input.png");
              if (!image_url) throw new Error("no url");
              log("uploaded asset:", image_url);
            } catch (e) {
              log("asset upload failed, using base64 dataURL:", e.message);
              image_url = await blobToDataUrl(sendBlob);
            }

            // 5. Build request body
            const endpoint =
              MODEL_ENDPOINTS[model] || MODEL_ENDPOINTS["chatgpt-2"];
            const w = sendW;
            const h = sendH;
            let body = { prompt };

            if (model === "flux-kontext") {
              body.image_url = image_url;
              body.strength = strength;
              body.steps = 25;
              body.width = w;
              body.height = h;
            } else if (model === "chatgpt-2") {
              body.image_urls = [image_url];
              body.width = w;
              body.height = h;
              body.quality = "high";
            } else if (model === "seededit") {
              body.image_url = image_url;
            } else if (model === "nano-banana" || model === "nano-banana-pro" || model === "imagen-4") {
              body.image_urls = [image_url];
              body.width = w;
              body.height = h;
            } else {
              body.image_url = image_url;
              body.strength = strength;
              body.width = w;
              body.height = h;
            }

            // 6. Submit job
            showStatus(t("submitting"), "loading", true);
            const genRes = await fetch(API_BASE + endpoint, {
              method: "POST",
              headers: {
                Authorization: `Bearer ${apiKey}`,
                "Content-Type": "application/json",
              },
              body: JSON.stringify(body),
            });

            if (!genRes.ok) {
              const errText = await genRes.text();
              throw new Error(`API Error ${genRes.status}: ${errText}`);
            }

            const genData = await genRes.json();
            const jobId = genData.job_id;
            log(`job submitted: endpoint=${endpoint} jobId=${jobId}`, body);
            showStatus(t("jobStarted", jobId.slice(0, 8)), "loading", true);

            // 7. Poll
            const result = await pollJob(apiKey, jobId);
            const resultUrl = result?.urls?.[0] || result?.url;
            log("job result:", result);
            if (!resultUrl) throw new Error(t("errNoUrl"));

            // 8. Download via proxy
            showStatus(t("downloading"), "loading", true);
            const proxyImgUrl =
              API_BASE + "/proxy?url=" + encodeURIComponent(resultUrl);
            const dlRes = await fetch(proxyImgUrl);
            if (!dlRes.ok)
              throw new Error("Download failed: " + dlRes.status);
            const dlBuffer = await dlRes.arrayBuffer();
            const blob = new Blob([dlBuffer], { type: "image/png" });
            const localUrl = URL.createObjectURL(blob);

            log(`result downloaded: ${dlBuffer.byteLength} bytes, resultUrl=${resultUrl}, cropBounds=${JSON.stringify(cropBounds)}`);
            lastResultUrl = resultUrl;
            lastResultBuffer = dlBuffer;
            lastCropBounds = cropBounds;
            document.getElementById("previewImg").src = localUrl;
            document.getElementById("previewBox").className =
              "preview-box visible";
            showStatus(t("done"), "success");
          } catch (err) {
            showStatus(`❌ ${err.message}`, "error");
            log("generate error:", err);
          } finally {
            document.getElementById("generateBtn").disabled = false;
          }
        });

      // ─── Apply result to Photopea ─────────────────────────────────────────────────

      async function waitForNewLayer(expectedCount, maxWaitMs = 8000) {
        const start = Date.now();
        while (Date.now() - start < maxWaitMs) {
          const r = await ppRun(`app.echoToOE(String(app.activeDocument.layers.length));`);
          if (parseInt(r[0], 10) > expectedCount) return true;
          await new Promise(res => setTimeout(res, 80));
        }
        return false;
      }

      document
        .getElementById("applyBtn")
        .addEventListener("click", async () => {
          if (!lastResultBuffer) return;
          showStatus(t("applying"), "loading", true);
          log(`apply: cropBounds=${JSON.stringify(lastCropBounds)} wasFullCanvas=${lastWasFullCanvas} bufferSize=${lastResultBuffer.byteLength}`);
          try {
            let bufferToSend = lastResultBuffer;

            if (lastCropBounds) {
              const img = await createImageBitmap(
                new Blob([lastResultBuffer], { type: "image/png" }),
              );
              const { left, top, right, bottom } = lastCropBounds;
              const targetW = right - left;
              const targetH = bottom - top;

              const canvas = document.createElement("canvas");
              canvas.width = targetW;
              canvas.height = targetH;
              const ctx = canvas.getContext("2d");

              if (lastWasFullCanvas) {
                ctx.drawImage(img, left, top, targetW, targetH, 0, 0, targetW, targetH);
              } else {
                ctx.drawImage(img, 0, 0, targetW, targetH);
              }

              bufferToSend = await new Promise((resolve) =>
                canvas.toBlob(
                  async (blob) => resolve(await blob.arrayBuffer()),
                  "image/png",
                ),
              );
              log(`apply: cropped buffer ready: ${bufferToSend.byteLength} bytes, targetW=${targetW} targetH=${targetH}`);
            }

            const base64 = arrayBufferToBase64(bufferToSend);
            const dataUrl = `data:image/png;base64,${base64}`;

            const lcRes = await ppRun(`app.echoToOE(String(app.activeDocument.layers.length));`);
            const layerCountBefore = parseInt(lcRes[0], 10);
            log(`apply: layerCountBefore=${layerCountBefore}`);

            log(`apply: opening as smart object in current doc (${bufferToSend.byteLength} bytes)`);
            await ppRun(`
              try {
                var doc = app.activeDocument;
                for (var i = 0; i < doc.layers.length; i++) {
                  if (doc.layers[i].typename !== "LayerSet") {
                    doc.activeLayer = doc.layers[i];
                    break;
                  }
                }
                app.open(${JSON.stringify(dataUrl)}, null, true);
                app.echoToOE("ok");
              } catch(e) {
                app.echoToOE("err:" + e);
              }
            `);

            log(`apply: waiting for new layer (expected count > ${layerCountBefore})...`);
            const added = await waitForNewLayer(layerCountBefore);
            if (!added) throw new Error(t("errLayerNotAdded"));
            log(`apply: new layer detected`);

            const hasPos = lastCropBounds !== null;
            const selLeft = hasPos ? lastCropBounds.left : 0;
            const selTop = hasPos ? lastCropBounds.top : 0;
            const imgW = hasPos ? lastCropBounds.right - lastCropBounds.left : 0;
            const imgH = hasPos ? lastCropBounds.bottom - lastCropBounds.top : 0;

            const posRes = await ppRun(`
              try {
                var doc = app.activeDocument;
                var lyr = doc.layers[0];
                doc.activeLayer = lyr;
                lyr.name = "Krea AI Result";
                ${hasPos ? `
                var selLeft = ${selLeft};
                var selTop = ${selTop};
                var imgW = ${imgW};
                var imgH = ${imgH};
                var centerX = doc.width / 2;
                var centerY = doc.height / 2;
                var curLeft = centerX - imgW / 2;
                var curTop = centerY - imgH / 2;
                lyr.translate(selLeft - curLeft, selTop - curTop);
                app.echoToOE("ok:placed at " + selLeft + "," + selTop + " delta=" + (selLeft - curLeft) + "," + (selTop - curTop));
                ` : `app.echoToOE("ok:no reposition");`}
              } catch(e) { app.echoToOE("err:" + e); }
            `);
            log("apply: pos result:", posRes);

            showStatus(t("applied"), "success");
          } catch (err) {
            log("apply error:", err);
            showStatus(`❌ ${err.message}`, "error");
          }
        });

      // ─── Discard ──────────────────────────────────────────────────────────────────
      document.getElementById("discardBtn").addEventListener("click", () => {
        document.getElementById("previewBox").className = "preview-box";
        hideStatus();
        lastResultUrl = null;
        lastResultBlob = null;
        lastResultBuffer = null;
        lastCropBounds = null;
        lastWasFullCanvas = false;
      });
    </script>
  </body>
</html>
